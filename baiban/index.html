<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>协作白板</title>
<style>
/* ============ Reset ============ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#f0f0f0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}

/* ============ Toolbar ============ */
.toolbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:50px;background:#1a1a2e;
  display:flex;align-items:center;padding:0 8px;gap:2px;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.toolbar-group{display:flex;align-items:center;gap:2px;padding:0 4px}
.toolbar-divider{width:1px;height:24px;background:rgba(255,255,255,.15);margin:0 4px}
.tool-btn{
  width:40px;height:40px;border:none;background:transparent;
  border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.7);flex-shrink:0;
  transition:background .15s;
}
.tool-btn:active,.tool-btn.active{background:rgba(99,102,241,.6);color:#fff}
.tool-btn svg{width:20px;height:20px;pointer-events:none}
.tool-btn img{width:20px;height:20px;pointer-events:none}

.color-swatch{
  width:28px;height:28px;border-radius:50%;
  border:2px solid transparent;cursor:pointer;flex-shrink:0;
  transition:transform .15s;
}
.color-swatch:active{transform:scale(1.15)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.5)}

.thickness-btn{
  width:30px;height:30px;border:2px solid transparent;
  border-radius:50%;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.thickness-btn.active{border-color:rgba(255,255,255,.8);background:rgba(255,255,255,.15)}
.thickness-dot{border-radius:50%;background:#fff}
.tool-label{color:rgba(255,255,255,.5);font-size:10px;padding:0 4px;white-space:nowrap;display:none}

/* ============ Canvas ============ */
.canvas-container{
  position:fixed;top:50px;left:0;right:0;bottom:0;
  background-color:#fff;
  background-image:
    linear-gradient(#e5e5e5 1px,transparent 1px),
    linear-gradient(90deg,#e5e5e5 1px,transparent 1px);
  background-size:24px 24px;
  overflow:hidden;
  touch-action:none;
}
.transform-layer{position:absolute;top:0;left:0;transform-origin:0 0;width:0;height:0}

.drawing-svg{
  position:absolute;top:-10000px;left:-10000px;
  width:20000px;height:20000px;overflow:visible;
  pointer-events:none;
}
.drawing-svg path{pointer-events:stroke}
.drawing-svg .connection-line{pointer-events:stroke}

/* ============ Sticky Notes ============ */
.sticky-note{
  position:absolute;width:180px;min-height:140px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  display:flex;flex-direction:column;z-index:10;
  -webkit-user-select:none;user-select:none;
}
.sticky-note.selected{box-shadow:0 0 0 3px #6366f1,0 4px 20px rgba(99,102,241,.35);z-index:20}

.note-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px 4px;border-radius:10px 10px 0 0;min-height:32px;
}
.note-colors{display:flex;gap:4px}
.note-color-dot{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid rgba(0,0,0,.2);cursor:pointer;
}
.note-color-dot.active{border-color:rgba(0,0,0,.6);box-shadow:0 0 0 2px rgba(0,0,0,.2)}

.note-delete-btn{
  width:26px;height:26px;border:none;background:rgba(0,0,0,.1);
  border-radius:50%;cursor:pointer;font-size:16px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.5);
}
.note-delete-btn:active{background:rgba(255,0,0,.2);color:#c00}

/* CRITICAL: note-body must allow browser touch for editing */
.note-body{
  flex:1;padding:6px 10px 10px;outline:none;
  font-size:15px;line-height:1.6;color:rgba(0,0,0,.8);
  word-wrap:break-word;min-height:70px;
  -webkit-user-select:text;user-select:text;
  touch-action:manipulation;
  cursor:text;
}
.note-body:empty::before{
  content:'轻点编辑…';color:rgba(0,0,0,.25);pointer-events:none;
}
.note-resize-handle{
  position:absolute;bottom:0;right:0;
  width:22px;height:22px;
  background:linear-gradient(135deg,transparent 50%,rgba(0,0,0,.2) 50%);
  border-radius:0 0 10px 0;
}

/* ============ Minimap ============ */
.minimap{
  position:fixed;bottom:16px;right:12px;
  width:130px;height:90px;
  background:#fff;border:2px solid #d0d0d0;
  border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);
  z-index:900;overflow:hidden;
}
.minimap canvas{width:100%;height:100%;display:block}
.minimap-label{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:8px;color:#999}

/* ============ Zoom indicator ============ */
.zoom-indicator{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);color:#fff;
  font-size:13px;padding:5px 14px;border-radius:14px;
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:950;
}
.zoom-indicator.show{opacity:1}

/* ============ Bottom Sheet Menu ============ */
.context-menu{
  position:fixed;bottom:0;left:0;right:0;z-index:2000;
  background:#fff;border-radius:16px 16px 0 0;
  box-shadow:0 -4px 20px rgba(0,0,0,.15);
  padding:8px 0 24px;
  transform:translateY(100%);transition:transform .25s ease;
}
.context-menu.show{transform:translateY(0)}
.context-menu-backdrop{
  position:fixed;inset:0;z-index:1999;background:rgba(0,0,0,.3);
  display:none;
}
.context-menu-backdrop.show{display:block}
.context-menu-item{
  padding:14px 24px;font-size:16px;cursor:pointer;
  display:flex;align-items:center;gap:12px;color:#333;
}
.context-menu-item:active{background:#f0f0f5}
.context-menu-item.danger{color:#d32f2f}
.context-menu-handle{width:36px;height:5px;background:#ddd;border-radius:3px;margin:0 auto 8px}
.context-menu-divider{height:1px;background:#eee;margin:4px 0}

/* ============ Long press ripple ============ */
@keyframes lpripple{to{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
.longpress-ripple{
  position:fixed;width:44px;height:44px;
  border-radius:50%;border:3px solid #6366f1;
  transform:translate(-50%,-50%) scale(.5);
  opacity:.8;pointer-events:none;z-index:1500;
  animation:lpripple .5s ease-out forwards;
}

/* ============ Responsive ============ */
@media(min-width:768px){
  .tool-label{display:inline}
  .toolbar{padding:0 12px}
  .sticky-note{width:200px;min-height:160px}
  .minimap{width:160px;height:110px}
}
@media(min-width:1024px){
  .toolbar{padding:0 16px}
  .sticky-note{width:220px;min-height:170px}
  .note-body{font-size:14px}
  .minimap{width:180px;height:120px}
}
@supports(padding-top:env(safe-area-inset-top)){
  .toolbar{padding-top:env(safe-area-inset-top);height:calc(50px + env(safe-area-inset-top))}
  .canvas-container{top:calc(50px + env(safe-area-inset-top))}
  .context-menu{padding-bottom:calc(24px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <button class="tool-btn active" data-tool="select">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4l6 16 2-6 6-2z"/><line x1="13" y1="13" x2="20" y2="20"/>
    </svg>
  </button>
  <button class="tool-btn" data-tool="note">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="16" height="18" rx="2"/>
      <line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/>
    </svg>
  </button>
  <button class="tool-btn" data-tool="pen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </button>
  <button class="tool-btn" data-tool="connection">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="5" cy="5" r="2"/><circle cx="19" cy="19" r="2"/>
      <path d="M5 7v4a4 4 0 004 4h6a4 4 0 014 4v1"/>
    </svg>
  </button>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group pen-settings" style="display:none">
    <span class="color-swatch active" data-pen-color="#1a1a2e" style="background:#1a1a2e"></span>
    <span class="color-swatch" data-pen-color="#e74c3c" style="background:#e74c3c"></span>
    <span class="color-swatch" data-pen-color="#2980b9" style="background:#2980b9"></span>
    <span class="color-swatch" data-pen-color="#27ae60" style="background:#27ae60"></span>
    <span class="color-swatch" data-pen-color="#f39c12" style="background:#f39c12"></span>
    <span class="color-swatch" data-pen-color="#8e44ad" style="background:#8e44ad"></span>
    <div class="toolbar-divider" style="margin:0 4px"></div>
    <button class="thickness-btn active" data-thickness="2"><span class="thickness-dot" style="width:4px;height:4px"></span></button>
    <button class="thickness-btn" data-thickness="4"><span class="thickness-dot" style="width:7px;height:7px"></span></button>
    <button class="thickness-btn" data-thickness="6"><span class="thickness-dot" style="width:10px;height:10px"></span></button>
    <button class="thickness-btn" data-thickness="10"><span class="thickness-dot" style="width:14px;height:14px"></span></button>
  </div>

  <div class="toolbar-group note-settings" style="display:none">
    <span class="color-swatch active" data-preset-color="#FFF9C4" style="background:#FFF9C4"></span>
    <span class="color-swatch" data-preset-color="#FFCDD2" style="background:#FFCDD2"></span>
    <span class="color-swatch" data-preset-color="#BBDEFB" style="background:#BBDEFB"></span>
    <span class="color-swatch" data-preset-color="#C8E6C9" style="background:#C8E6C9"></span>
    <span class="color-swatch" data-preset-color="#FFE0B2" style="background:#FFE0B2"></span>
    <span class="color-swatch" data-preset-color="#E1BEE7" style="background:#E1BEE7"></span>
  </div>

  <div class="toolbar-group connect-settings" style="display:none">
    <span class="color-swatch active" data-conn-color="#6366f1" style="background:#6366f1"></span>
    <span class="color-swatch" data-conn-color="#1a1a2e" style="background:#1a1a2e"></span>
    <span class="color-swatch" data-conn-color="#e74c3c" style="background:#e74c3c"></span>
    <span class="color-swatch" data-conn-color="#27ae60" style="background:#27ae60"></span>
    <span class="color-swatch" data-conn-color="#f39c12" style="background:#f39c12"></span>
  </div>

  <div style="flex:1"></div>

  <button class="tool-btn" id="btn-clear" style="color:rgba(255,255,255,.5)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
    </svg>
  </button>
  <button class="tool-btn" id="btn-fit" style="color:rgba(255,255,255,.7)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
    </svg>
  </button>
</div>

<div class="canvas-container" id="canvasContainer">
  <div class="transform-layer" id="transformLayer">
    <svg class="drawing-svg" id="drawingSvg"></svg>
  </div>
</div>

<div class="minimap" id="minimap">
  <canvas id="minimapCanvas"></canvas>
  <span class="minimap-label">地图</span>
</div>

<div class="zoom-indicator" id="zoomIndicator">100%</div>

<div class="context-menu-backdrop" id="contextMenuBackdrop"></div>
<div class="context-menu" id="contextMenu">
  <div class="context-menu-handle"></div>
  <div class="context-menu-item" data-action="delete">🗑️ 删除</div>
  <div class="context-menu-item" data-action="duplicate">📋 复制</div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item" data-action="bringToFront">⬆️ 置于顶层</div>
  <div class="context-menu-item" data-action="sendToBack">⬇️ 置于底层</div>
</div>

<script>
// ====================================================================
// INTERACTION ENGINE — clean rewrite for mobile-first
// ====================================================================

// ---- STATE MACHINE ----
const S = {
  // Interaction
  phase: 'idle', // idle | deciding | panning | dragging | drawing | connecting | pinching | resizing

  // Pointer tracking
  startX: 0, startY: 0,
  startTime: 0,
  moveX: 0, moveY: 0,
  moved: false,

  // What we touched
  startTarget: null, // 'note' | 'empty' | null
  noteEl: null,

  // Viewport
  vpX: 0, vpY: 0, zoom: 1,
  vpStartX: 0, vpStartY: 0,

  // Pinch
  pinchStartDist: 0,
  pinchStartZoom: 1,
  pinchMidX: 0, pinchMidY: 0,
  pinchVpX: 0, pinchVpY: 0,

  // Dragging element
  dragEl: null,
  dragOffX: 0, dragOffY: 0,

  // Resizing
  resizeEl: null,
  resizeStartX: 0, resizeStartY: 0,
  resizeStartW: 0, resizeStartH: 0,

  // Drawing
  drawPathId: null,
  drawPathEl: null,
  drawPts: [],

  // Connecting
  connectSrc: null,
  connectLine: null,

  // Long press
  longPressTimer: null,

  // Double tap
  lastTapTime: 0,
  lastTapTargetId: null,
  lastTapX: 0, lastTapY: 0,

  // Tools
  tool: 'select',
  penColor: '#1a1a2e',
  penThick: 2,
  noteColor: '#FFF9C4',
  connColor: '#6366f1',

  // Selection
  selId: null,

  // Data
  elements: [],
};

// ---- DOM ----
const CC = document.getElementById('canvasContainer');
const TL = document.getElementById('transformLayer');
const DS = document.getElementById('drawingSvg');
const ZI = document.getElementById('zoomIndicator');
const CM = document.getElementById('contextMenu');
const CMB = document.getElementById('contextMenuBackdrop');
const MC = document.getElementById('minimapCanvas');
const MM = document.getElementById('minimap');

// ---- UTILS ----
const sc = (sx,sy) => { const r=CC.getBoundingClientRect(); return {x:(sx-r.left-S.vpX)/S.zoom, y:(sy-r.top-S.vpY)/S.zoom}; };
const applyVp = () => { TL.style.transform = `translate(${S.vpX}px,${S.vpY}px) scale(${S.zoom})`; CC.style.backgroundPosition = S.vpX+'px '+S.vpY+'px'; };
const uid = p => p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,6);
const dist = (a,b) => Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
const mid = (a,b) => ({x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2});
const evPos = e => e.touches&&e.touches[0] ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY};

// ---- ZOOM INDICATOR ----
let zt = null;
const showZoom = () => { ZI.textContent = Math.round(S.zoom*100)+'%'; ZI.classList.add('show'); clearTimeout(zt); zt=setTimeout(()=>ZI.classList.remove('show'),800); };

// ====================================================================
// POINTER EVENTS — the core interaction loop
// ====================================================================

CC.addEventListener('touchstart', onDown, {passive:false});
CC.addEventListener('mousedown', onDown);
CC.addEventListener('touchmove', onMove, {passive:false});
CC.addEventListener('mousemove', onMove);
CC.addEventListener('touchend', onUp);
CC.addEventListener('mouseup', onUp);
CC.addEventListener('touchcancel', onUp);
CC.addEventListener('wheel', onWheel, {passive:false});

function onDown(e) {
  if (e.target.closest('.toolbar')) return;
  if (e.target.closest('.context-menu')||e.target.closest('.context-menu-backdrop')) return;

  // If touching a note body, let the browser handle it for contenteditable
  if (e.target.closest('.note-body')) return;

  // If touching note sub-controls, let their handlers work
  if (e.target.closest('.note-color-dot')||e.target.closest('.note-delete-btn')) return;

  // If touching the resize handle
  if (e.target.closest('.note-resize-handle') && S.tool==='select') {
    S.phase = 'resizing';
    S.resizeEl = e.target.closest('.sticky-note');
    const cp = sc(e.clientX, e.clientY);
    S.resizeStartX = cp.x; S.resizeStartY = cp.y;
    S.resizeStartW = parseFloat(S.resizeEl.style.width);
    S.resizeStartH = parseFloat(S.resizeEl.style.minHeight);
    e.preventDefault();
    return;
  }

  const ts = e.touches;
  if (ts && ts.length === 2) {
    // Two-finger pinch
    cancelAll();
    S.phase = 'pinching';
    S.pinchStartDist = dist(ts[0],ts[1]);
    S.pinchStartZoom = S.zoom;
    const m = mid(ts[0],ts[1]);
    S.pinchMidX = m.x; S.pinchMidY = m.y;
    S.pinchVpX = S.vpX; S.pinchVpY = S.vpY;
    return;
  }

  const p = evPos(e);
  S.startX = p.x; S.startY = p.y;
  S.moveX = p.x; S.moveY = p.y;
  S.startTime = Date.now();
  S.moved = false;
  S.vpStartX = S.vpX; S.vpStartY = S.vpY;

  const noteEl = e.target.closest('.sticky-note');
  S.noteEl = noteEl;
  S.startTarget = noteEl ? 'note' : 'empty';

  // Pen mode on empty → draw
  if (S.tool === 'pen' && !noteEl) {
    S.phase = 'drawing';
    S.drawPts = [];
    const cp = sc(p.x, p.y);
    S.drawPts.push(cp);
    const pid = uid('path');
    const pel = document.createElementNS('http://www.w3.org/2000/svg','path');
    pel.setAttribute('id',pid); pel.setAttribute('fill','none');
    pel.setAttribute('stroke',S.penColor); pel.setAttribute('stroke-width',S.penThick);
    pel.setAttribute('stroke-linecap','round'); pel.setAttribute('stroke-linejoin','round');
    pel.style.pointerEvents='stroke'; pel.dataset.type='path';
    pel.dataset.color=S.penColor; pel.dataset.thickness=S.penThick;
    DS.appendChild(pel);
    S.drawPathEl = pel; S.drawPathId = pid;
    S.elements.push({id:pid,type:'path',el:pel,points:[cp],color:S.penColor,thickness:S.penThick});
    e.preventDefault();
    return;
  }

  // Connection mode → try connect
  if (S.tool === 'connection' && !noteEl) {
    S.phase = 'connecting';
    const cp = sc(p.x, p.y);
    const nn = findNearNote(cp);
    if (nn) {
      S.connectSrc = nn;
      const lid = uid('tmp');
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('stroke',S.connColor); line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-dasharray','6 3'); line.style.pointerEvents='none';
      const sc2 = getCenter(nn.id);
      line.setAttribute('x1',sc2.x); line.setAttribute('y1',sc2.y);
      line.setAttribute('x2',cp.x); line.setAttribute('y2',cp.y);
      DS.appendChild(line); S.connectLine = line;
    }
    e.preventDefault();
    return;
  }

  // Note mode on empty → will place note on tap (handled in onUp)
  if (S.tool === 'note') {
    S.phase = 'deciding';
    return;
  }

  // Select mode on note → select it, start long press timer
  if (noteEl && S.tool === 'select') {
    selectNote(noteEl.id);
    startLongPress(noteEl, p);
    S.phase = 'deciding';
    e.preventDefault();
    return;
  }

  // Select mode on path/connection
  if (S.tool === 'select') {
    const pl = e.target.closest('path[data-type="path"]');
    const cl = e.target.closest('.connection-line');
    if (pl) { selectPath(pl); S.phase = 'deciding'; e.preventDefault(); return; }
    if (cl) { selectConn(cl); S.phase = 'deciding'; e.preventDefault(); return; }
  }

  // Default: prepare to pan
  S.phase = 'deciding';
  e.preventDefault();
}

function onMove(e) {
  const ts = e.touches;

  // Pinch
  if (S.phase === 'pinching') {
    if (ts && ts.length === 2) {
      const d = dist(ts[0],ts[1]);
      if (S.pinchStartDist < 5) return;
      const nz = Math.min(5,Math.max(.1,S.pinchStartZoom*d/S.pinchStartDist));
      const r = CC.getBoundingClientRect();
      const mx = S.pinchMidX-r.left, my = S.pinchMidY-r.top;
      S.vpX = mx-(mx-S.pinchVpX)*(nz/S.zoom);
      S.vpY = my-(my-S.pinchVpY)*(nz/S.zoom);
      S.zoom = nz; applyVp(); showZoom();
    }
    return;
  }
  if (S.phase === 'pinching' && (!ts||ts.length<2)) { S.phase='idle'; return; }

  const p = evPos(e);

  // Drawing
  if (S.phase === 'drawing') {
    const cp = sc(p.x, p.y); S.drawPts.push(cp);
    let d=''; S.drawPts.forEach((pt,i)=>d+=(i?'L':'M')+pt.x+' '+pt.y+' ');
    S.drawPathEl.setAttribute('d',d);
    const elem = S.elements.find(x=>x.id===S.drawPathId);
    if (elem) elem.points = [...S.drawPts];
    e.preventDefault();
    return;
  }

  // Connecting
  if (S.phase === 'connecting' && S.connectLine) {
    const cp = sc(p.x, p.y);
    S.connectLine.setAttribute('x2',cp.x); S.connectLine.setAttribute('y2',cp.y);
    e.preventDefault();
    return;
  }

  // Dragging element
  if (S.phase === 'dragging') {
    const cp = sc(p.x, p.y);
    S.dragEl.style.left = (cp.x-S.dragOffX)+'px';
    S.dragEl.style.top = (cp.y-S.dragOffY)+'px';
    const elem = S.elements.find(x=>x.id===S.dragEl.id);
    if (elem) { elem.x = cp.x-S.dragOffX; elem.y = cp.y-S.dragOffY; }
    updateConnections();
    return;
  }

  // Resizing
  if (S.phase === 'resizing') {
    const cp = sc(p.x, p.y);
    const nw = Math.max(100, S.resizeStartW+(cp.x-S.resizeStartX));
    const nh = Math.max(70, S.resizeStartH+(cp.y-S.resizeStartY));
    S.resizeEl.style.width = nw+'px'; S.resizeEl.style.minHeight = nh+'px';
    const elem = S.elements.find(x=>x.id===S.resizeEl.id);
    if (elem) { elem.w=nw; elem.h=nh; }
    e.preventDefault();
    return;
  }

  // Panning
  if (S.phase === 'panning') {
    S.vpX = S.vpStartX+(p.x-S.startX); S.vpY = S.vpStartY+(p.y-S.startY);
    applyVp();
    return;
  }

  // Deciding → check if moved enough
  if (S.phase === 'deciding') {
    const dx = p.x-S.startX, dy = p.y-S.startY;
    if (Math.abs(dx)>5||Math.abs(dy)>5) {
      S.moved = true;
      clearLp();
      // If started on a note → drag it
      if (S.noteEl && S.tool==='select' && S.selId===S.noteEl.id) {
        S.phase = 'dragging';
        S.dragEl = S.noteEl;
        const cp = sc(p.x, p.y);
        S.dragOffX = cp.x-parseFloat(S.dragEl.style.left);
        S.dragOffY = cp.y-parseFloat(S.dragEl.style.top);
        S.dragEl.style.zIndex = 999;
        return;
      }
      // Otherwise → pan
      S.phase = 'panning';
    }
  }

  S.moveX = p.x; S.moveY = p.y;
}

function onUp(e) {
  const ts = e.touches;

  // Pinch
  if (S.phase==='pinching'&&(!ts||ts.length<2)) { S.phase='idle'; return; }

  // Drawing
  if (S.phase==='drawing') {
    S.phase='idle';
    if (S.drawPts.length<2&&S.drawPathEl) { S.drawPathEl.remove(); S.elements=S.elements.filter(x=>x.id!==S.drawPathId); }
    S.drawPts=[]; S.drawPathEl=null; S.drawPathId=null;
    updateMinimap();
    return;
  }

  // Connecting
  if (S.phase==='connecting') {
    S.phase='idle';
    if (S.connectLine) {
      const p = evPos(e); const cp = sc(p.x, p.y);
      const nn = findNearNote(cp);
      if (nn&&nn.id!==S.connectSrc.id) makeConnection(S.connectSrc.id,nn.id);
      S.connectLine.remove(); S.connectLine=null; S.connectSrc=null;
    }
    return;
  }

  // Dragging
  if (S.phase==='dragging') {
    S.phase='idle';
    if (S.dragEl) S.dragEl.style.zIndex = 10+S.elements.findIndex(x=>x.id===S.dragEl.id);
    S.dragEl=null; updateMinimap();
    return;
  }

  // Resizing
  if (S.phase==='resizing') { S.phase='idle'; S.resizeEl=null; updateMinimap(); return; }

  // Panning
  if (S.phase==='panning') { S.phase='idle'; return; }

  // Deciding → it's a tap
  if (S.phase==='deciding') {
    S.phase='idle';
    clearLp();
    S.noteEl = null;

    const p = evPos(e);
    const noteEl = e.target.closest('.sticky-note');
    const noteBody = e.target.closest('.note-body');

    // Double tap detection
    const now = Date.now();
    const tid = noteEl?noteEl.id:null;
    if (tid&&tid===S.lastTapTargetId&&now-S.lastTapTime<400&&Math.abs(p.x-S.lastTapX)<25&&Math.abs(p.y-S.lastTapY)<25) {
      // Double tap on note
      if (noteEl&&S.tool==='select') {
        S.longPressTarget=null;
        const body = noteEl.querySelector('.note-body');
        if (body) { body.focus(); const r=document.createRange(); r.selectNodeContents(body); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); }
      }
      S.lastTapTime=0; S.lastTapTargetId=null; S.lastTapX=0; S.lastTapY=0;
      return;
    }
    S.lastTapTime=now; S.lastTapTargetId=tid; S.lastTapX=p.x; S.lastTapY=p.y;

    // Note mode → create note
    if (S.tool==='note' && !noteEl) {
      const cp = sc(p.x, p.y);
      createNote(cp.x-(window.innerWidth<768?90:100), cp.y-70);
      return;
    }

    // Select mode on note → select + focus body
    if (noteEl && S.tool==='select') {
      selectNote(noteEl.id);
      if (noteBody) { setTimeout(()=>{if(S.selId===noteEl.id)noteBody.focus();},80); }
      return;
    }

    // Select mode on empty → deselect
    if (S.tool==='select' && !noteEl) {
      deselectAll(); S.lastTapTargetId=null;
      return;
    }

    // Note mode on existing note → don't create new
    if (S.tool==='note' && noteEl) return;
  }
}

function onWheel(e) {
  e.preventDefault();
  const r=CC.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const f=e.deltaY<0?1.08:1/1.08;
  const nz=Math.min(5,Math.max(.1,S.zoom*f));
  S.vpX=mx-(mx-S.vpX)*(nz/S.zoom); S.vpY=my-(my-S.vpY)*(nz/S.zoom);
  S.zoom=nz; applyVp(); showZoom();
}

// ---- CANCEL ----
function cancelAll() {
  S.phase='idle'; clearLp();
  if (S.drawPathEl&&S.drawPts.length<2) { S.drawPathEl.remove(); S.elements=S.elements.filter(x=>x.id!==S.drawPathId); }
  if (S.connectLine) { S.connectLine.remove(); S.connectLine=null; }
  if (S.dragEl) { S.dragEl.style.zIndex=10+S.elements.findIndex(x=>x.id===S.dragEl.id); S.dragEl=null; }
  S.drawPts=[]; S.drawPathEl=null; S.drawPathId=null; S.connectSrc=null;
  S.resizeEl=null; S.noteEl=null; S.startTarget=null;
}

// ====================================================================
// LONG PRESS
// ====================================================================
function startLongPress(noteEl, pos) {
  clearLp();
  S.longPressTarget = noteEl;
  S.longPressTimer = setTimeout(() => {
    if (!S.moved && S.phase==='deciding' && S.selId===noteEl.id) {
      showContextMenu();
      // Ripple
      const rp = document.createElement('div'); rp.className='longpress-ripple';
      rp.style.left=pos.x+'px'; rp.style.top=pos.y+'px';
      document.body.appendChild(rp); setTimeout(()=>rp.remove(),600);
      if (navigator.vibrate) navigator.vibrate(15);
    }
    S.longPressTarget = null;
  }, 600);
}
function clearLp() { if(S.longPressTimer){clearTimeout(S.longPressTimer);S.longPressTimer=null;} S.longPressTarget=null; }

// ====================================================================
// NOTES
// ====================================================================
function createNote(cx, cy, color, text, w, h) {
  const id = uid('note');
  const nc = color||S.noteColor;
  const nw = w||(window.innerWidth<768?180:200);
  const nh = h||(window.innerWidth<768?140:160);

  const div = document.createElement('div');
  div.className='sticky-note'; div.id=id;
  div.style.left=cx+'px'; div.style.top=cy+'px';
  div.style.width=nw+'px'; div.style.minHeight=nh+'px';
  div.style.backgroundColor=nc;
  div.style.zIndex=10+S.elements.length;
  div.dataset.type='note'; div.dataset.color=nc;

  const hbg = adjColor(nc,-8);
  div.innerHTML = `<div class="note-header" style="background:${hbg}">
    <div class="note-colors">${['#FFF9C4','#FFCDD2','#BBDEFB','#C8E6C9','#FFE0B2','#E1BEE7'].map(c=>`<span class="note-color-dot${c===nc?' active':''}" data-color="${c}" style="background:${c}"></span>`).join('')}</div>
    <button class="note-delete-btn">×</button>
  </div>
  <div class="note-body" contenteditable="true">${text||''}</div>
  <div class="note-resize-handle"></div>`;

  div.querySelector('.note-delete-btn').addEventListener('click', ev=>{ev.stopPropagation();deleteElement(id);});
  div.querySelectorAll('.note-color-dot').forEach(dot=>{
    dot.addEventListener('click', ev=>{ev.stopPropagation();changeColor(id,dot.dataset.color);});
  });

  TL.appendChild(div);
  S.elements.push({id,type:'note',el:div,x:cx,y:cy,w:nw,h:nh,color:nc});
  selectNote(id);
  updateMinimap();
}

function changeColor(id, c) {
  const el = document.getElementById(id); if(!el)return;
  el.style.backgroundColor=c; el.dataset.color=c;
  el.querySelector('.note-header').style.background=adjColor(c,-8);
  el.querySelectorAll('.note-color-dot').forEach(d=>d.classList.toggle('active',d.dataset.color===c));
  const e=S.elements.find(x=>x.id===id); if(e)e.color=c;
  updateMinimap();
}

function adjColor(hex,a){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,Math.max(0,(n>>16)+a))},${Math.min(255,Math.max(0,((n>>8)&0xFF)+a))},${Math.min(255,Math.max(0,(n&0xFF)+a))})`;}

// ====================================================================
// CONNECTIONS
// ====================================================================
function findNearNote(pos) {
  for (let i=S.elements.length-1;i>=0;i--) {
    const e=S.elements[i]; if(e.type!=='note')continue;
    if(Math.hypot(pos.x-(e.x+e.w/2),pos.y-(e.y+e.h/2))<Math.max(e.w,e.h)*.6)return e;
  } return null;
}
function getCenter(id){const e=S.elements.find(x=>x.id===id);if(!e)return{x:0,y:0};if(e.type==='note')return{x:e.x+e.w/2,y:e.y+e.h/2};return{x:e.x||0,y:e.y||0};}

function makeConnection(fromId, toId) {
  const ex=S.elements.some(x=>x.type==='connection'&&((x.from===fromId&&x.to===toId)||(x.from===toId&&x.to===fromId)));
  if(ex) return;
  const cid=uid('conn');
  const f=getCenter(fromId), t=getCenter(toId);
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('id',cid); line.setAttribute('x1',f.x); line.setAttribute('y1',f.y);
  line.setAttribute('x2',t.x); line.setAttribute('y2',t.y);
  line.setAttribute('stroke',S.connColor); line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-linecap','round');
  line.classList.add('connection-line'); line.dataset.type='connection';
  line.dataset.from=fromId; line.dataset.to=toId;
  line.style.pointerEvents='stroke';
  DS.appendChild(line);
  S.elements.push({id:cid,type:'connection',el:line,from:fromId,to:toId,color:S.connColor});
  updateMinimap();
}

function updateConnections() {
  S.elements.forEach(e=>{if(e.type==='connection'){const f=getCenter(e.from),t=getCenter(e.to);e.el.setAttribute('x1',f.x);e.el.setAttribute('y1',f.y);e.el.setAttribute('x2',t.x);e.el.setAttribute('y2',t.y);}});
}

// ====================================================================
// SELECTION
// ====================================================================
function selectNote(id) {
  deselectAll(); S.selId=id;
  const el=document.getElementById(id);
  if(el)el.classList.add('selected');
}
function selectPath(el) {
  deselectAll(); S.selId=el.id;
  el.dataset.os=el.getAttribute('stroke'); el.dataset.ow=el.getAttribute('stroke-width');
  el.setAttribute('stroke','#6366f1'); el.setAttribute('stroke-width',String(parseInt(el.dataset.thickness||2)+2));
}
function selectConn(el) {
  deselectAll(); S.selId=el.id;
  el.dataset.os=el.getAttribute('stroke'); el.dataset.ow=el.getAttribute('stroke-width');
  el.setAttribute('stroke','#6366f1'); el.setAttribute('stroke-width','3');
}
function deselectAll() {
  if(S.selId){const p=document.getElementById(S.selId);if(p){p.classList.remove('selected');if(p.dataset.os){p.setAttribute('stroke',p.dataset.os);p.setAttribute('stroke-width',p.dataset.ow);}}}
  S.selId=null;
}

// ====================================================================
// DELETE / DUPLICATE
// ====================================================================
function deleteElement(id) {
  const el=document.getElementById(id);if(!el)return;
  S.elements=S.elements.filter(e=>{if(e.type==='connection'&&(e.from===id||e.to===id)){if(e.el)e.el.remove();return false}return true});
  el.remove(); S.elements=S.elements.filter(e=>e.id!==id);
  if(S.selId===id)S.selId=null; updateMinimap();
}
function dupElement(id) {
  const e=S.elements.find(x=>x.id===id);if(!e||e.type!=='note')return;
  createNote(e.x+30,e.y+30,e.color,e.el.querySelector('.note-body')?.innerText||'',e.w,e.h);
}

function showContextMenu() { CM.classList.add('show'); CMB.classList.add('show'); }
function hideContextMenu() { CM.classList.remove('show'); CMB.classList.remove('show'); }
CMB.addEventListener('click', hideContextMenu);
CM.querySelectorAll('.context-menu-item').forEach(item=>{

  });
});

document.getElementById('btn-clear').addEventListener('click',()=>{
  if(S.elements.length===0||!confirm('清空画布？'))return;

// ====================================================================
// KEYBOARD
// ====================================================================
document.addEventListener('keydown',e=>{
  if(e.target.contentEditable==='true'||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  switch(e.key.toLowerCase()){
    case'v':switchTool('select');break;case'n':switchTool('note');break;
    case'p':switchTool('pen');break;case'c':switchTool('connection');break;
    case'0':S.vpX=0;S.vpY=0;S.zoom=1;applyVp();showZoom();break;
    case'delete':case'backspace':if(S.selId)deleteElement(S.selId);break;
    case'escape':deselectAll();cancelAll();break;
    case'+':case'=':e.preventDefault();S.zoom=Math.min(5,S.zoom*1.1);applyVp();showZoom();break;
    case'-':e.preventDefault();S.zoom=Math.max(.1,S.zoom/1.1);applyVp();showZoom();break;
  }
});

// ====================================================================
// MINIMAP
// ====================================================================
function updateMinimap() {
  const w=MM.clientWidth,h=MM.clientHeight;
  MC.width=w*(window.devicePixelRatio||1); MC.height=h*(window.devicePixelRatio||1);
  MC.style.width=w+'px'; MC.style.height=h+'px';
  const ctx=MC.getContext('2d'); ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  ctx.fillStyle='#fafafa';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=.5;
  for(let x=0;x<w;x+=8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
  for(let y=0;y<h;y+=8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  S.elements.forEach(el=>{
    if(el.type==='note'){minX=Math.min(minX,el.x);minY=Math.min(minY,el.y);maxX=Math.max(maxX,el.x+el.w);maxY=Math.max(maxY,el.y+el.h)}
    else if(el.type==='path'&&el.points)el.points.forEach(p=>{minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y)})
  });
  if(!isFinite(minX)){minX=-500;minY=-400;maxX=500;maxY=400}
  const px=(maxX-minX)*.2||200;minX-=px;maxX+=px;const py=(maxY-minY)*.2||200;minY-=py;maxY+=py;
  const s=Math.min(w/(maxX-minX),h/(maxY-minY));
  const tx=cx=>(cx-minX)*s,ty=cy=>(cy-minY)*s,tsz=sz=>sz*s;
  S.elements.forEach(el=>{
    if(el.type==='note'){ctx.fillStyle=el.color||'#FFF9C4';ctx.fillRect(tx(el.x),ty(el.y),tsz(el.w),tsz(el.h));ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.strokeRect(tx(el.x),ty(el.y),tsz(el.w),tsz(el.h))}
    else if(el.type==='path'&&el.points&&el.points.length>1){ctx.strokeStyle=el.color||'#000';ctx.lineWidth=Math.max(1,tsz(el.thickness||2));ctx.beginPath();ctx.moveTo(tx(el.points[0].x),ty(el.points[0].y));for(let i=1;i<el.points.length;i++)ctx.lineTo(tx(el.points[i].x),ty(el.points[i].y));ctx.stroke()}
    else if(el.type==='connection'){const f=getCenter(el.from),t=getCenter(el.to);ctx.strokeStyle=el.color||'#6366f1';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tx(f.x),ty(f.y));ctx.lineTo(tx(t.x),ty(t.y));ctx.stroke()}
  });
  const cr=CC.getBoundingClientRect();
  const vw=cr.width/S.zoom,vh=cr.height/S.zoom;
  const vx=-S.vpX/S.zoom,vy=-S.vpY/S.zoom;
  ctx.strokeStyle='#6366f1';ctx.lineWidth=2;ctx.fillStyle='rgba(99,102,241,.08)';
  ctx.fillRect(tx(vx),ty(vy),tsz(vw),tsz(vh));ctx.strokeRect(tx(vx),ty(vy),tsz(vw),tsz(vh));
}

MM.addEventListener('click', e=>{navigateMinimap(e.clientX,e.clientY)});
function navigateMinimap(mx,my) {
  const r=MM.getBoundingClientRect();
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  S.elements.forEach(el=>{if(el.type==='note'){minX=Math.min(minX,el.x);minY=Math.min(minY,el.y);maxX=Math.max(maxX,el.x+el.w);maxY=Math.max(maxY,el.y+el.h)}else if(el.type==='path'&&el.points)el.points.forEach(p=>{minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y)})});
  if(!isFinite(minX)){minX=-500;minY=-400;maxX=500;maxY=400}
  const px=(maxX-minX)*.2||200;minX-=px;maxX+=px;const py=(maxY-minY)*.2||200;minY-=py;maxY+=py;
  const s=Math.min(r.width/(maxX-minX),r.height/(maxY-minY));
  const tx=(mx-r.left)/s+minX,ty=(my-r.top)/s+minY;
  const cr=CC.getBoundingClientRect();
  S.vpX=-(tx*S.zoom-cr.width/2);S.vpY=-(ty*S.zoom-cr.height/2);applyVp();
}

// ====================================================================
// INIT
// ====================================================================
function init() {
  applyVp();
  const m=window.innerWidth<768;
